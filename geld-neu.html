<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#fff8dc">
<title>Geld-Entdecker</title>
<style>
:root{--money-sprite:none;--ink:#22314d;--muted:#65758b;--green:#27aa68;--line:#dbe6ef;--good:#e4f8ec}
*{box-sizing:border-box} body{margin:0;min-height:100vh;color:var(--ink);font-family:ui-rounded,"Arial Rounded MT Bold","Nunito",system-ui,sans-serif;background:linear-gradient(155deg,#fff7cf,#eef9ff)} button,select{font:inherit}
.app{width:min(1220px,calc(100% - 18px));margin:9px auto;padding:15px;background:#ffffffdc;border-radius:28px;box-shadow:0 18px 50px #34455c20}
.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px} .title{display:flex;align-items:center;gap:12px} .badge{width:58px;height:58px;border-radius:18px;background:#ffd65b;display:grid;place-items:center;font-size:34px} h1{margin:0;font-size:clamp(30px,4vw,46px);line-height:1} .small{font-size:14px;font-weight:850;color:var(--muted);margin-top:3px} .round{width:50px;height:50px;border:0;border-radius:16px;background:white;box-shadow:0 7px 17px #34455c20;cursor:pointer;font-size:22px}
.task{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:14px;padding:15px 18px;border-radius:27px;color:white;background:linear-gradient(145deg,#7656ca,#5e43b1);box-shadow:0 13px 27px #5c42a634} .product{width:78px;height:78px;border-radius:22px;background:white;display:grid;place-items:center;font-size:44px} .task-name{font-size:clamp(28px,3.8vw,41px);font-weight:950;line-height:1} .task-way{font-size:clamp(20px,2.6vw,29px);font-weight:900;margin-top:6px} .price{min-width:165px;background:white;color:#4e3794;border-radius:21px;padding:10px 15px;text-align:center} .price small{display:block;font-size:12px;font-weight:950;text-transform:uppercase;letter-spacing:.08em} .price strong{font-size:clamp(34px,4.6vw,48px);line-height:1.05}
.progress{margin-top:12px;display:flex;justify-content:space-between;align-items:center;gap:10px;padding:11px 15px;border:2px solid var(--line);border-radius:19px;background:white;font-weight:950} .dots{display:flex;gap:8px} .dot{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;background:#edf2f6;color:#91a1b2} .dot.done{background:var(--good);color:#157347}
.board{display:grid;grid-template-columns:minmax(340px,1fr) minmax(370px,1fr) minmax(270px,.72fr);gap:14px;margin-top:14px;align-items:start} .card{padding:14px;border:2px solid var(--line);border-radius:25px;background:white;box-shadow:0 9px 22px #34455c12} .head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px} .head h2{margin:0;font-size:clamp(25px,3vw,31px)} .hint{font-size:13px;font-weight:850;color:var(--muted);text-align:right}
.bank{display:grid;grid-template-columns:repeat(3,minmax(92px,1fr));gap:9px} .money-btn{min-height:111px;border:2px solid #dfe7ee;border-radius:17px;background:#fafcff;display:grid;place-items:center;align-content:center;gap:3px;padding:6px;cursor:grab} .money-btn:hover{border-color:#9ccfeb;background:#f0faff} .money-btn:active{cursor:grabbing} .money-btn.dragging{opacity:.48} .money-label{font-size:13px;font-weight:950;color:#53647b}
.money-img{display:block;width:100px;height:67px;background-image:var(--money-sprite);background-repeat:no-repeat;background-size:400% 400%;background-position:var(--x) var(--y);pointer-events:none} .placed .money-img{width:82px;height:55px} .solution-money .money-img{width:59px;height:39px}
.tray{min-height:275px;display:flex;flex-wrap:wrap;align-content:flex-start;gap:9px;padding:12px;border:4px dashed #94d0ef;border-radius:23px;background:linear-gradient(#f6fcff,#edf9ff)} .tray.over{background:#dff4ff;border-color:#36afe9} .empty{width:100%;padding:65px 10px;text-align:center;font-size:22px;font-weight:900;color:#77879a} .placed{border:2px solid #dfe7ee;border-radius:15px;background:white;padding:5px;cursor:pointer}
.sumline{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;margin-top:11px} .meter{height:17px;border-radius:999px;background:#ecf2f6;overflow:hidden} .meter i{display:block;width:0;height:100%;background:linear-gradient(90deg,#72d1fa,#2fb2e8);transition:.18s} .sum{font-size:clamp(28px,3.7vw,38px);font-weight:950;min-width:132px;text-align:right}
.actions{display:grid;grid-template-columns:1fr 1.2fr 1fr;gap:8px;margin-top:11px} .btn{min-height:55px;border:0;border-radius:17px;padding:9px;font-weight:950;cursor:pointer} .primary{background:var(--green);color:white} .soft{background:#edf4f9;color:var(--ink)} .orange{background:#fff0d6;color:#8d5810} .btn:disabled{opacity:.42;cursor:default}
.feedback{min-height:58px;margin-top:11px;padding:10px;border-radius:17px;background:#f3f6f9;display:grid;place-items:center;text-align:center;font-size:20px;font-weight:950;color:#5d6c80} .feedback.good{background:var(--good);color:#157347} .feedback.try{background:#fff0df;color:#955315} .feedback.same{background:#eee9fb;color:#5c44a3}
.solutions{display:grid;gap:9px} .solution-empty{padding:22px;border-radius:16px;background:#f5f7fa;text-align:center;font-weight:900;color:#7b8898} .solution{display:grid;grid-template-columns:36px 1fr;align-items:center;gap:8px;padding:8px;border:2px solid #bae7cc;border-radius:16px;background:#eaf9f0} .num{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:var(--green);color:white;font-weight:950} .solution-money{display:flex;gap:3px;flex-wrap:wrap}
details{margin-top:10px;border:2px solid var(--line);border-radius:18px;background:white;overflow:hidden} summary{list-style:none;padding:13px 15px;cursor:pointer;font-weight:950} summary::-webkit-details-marker{display:none} .settings{padding:0 14px 14px;display:grid;gap:9px} .setting{display:grid;gap:5px} .setting label{font-size:12px;font-weight:950;color:var(--muted);text-transform:uppercase} select{min-height:43px;border:2px solid var(--line);border-radius:12px;background:#f8fafc;padding:7px;font-weight:850} .two{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.modal{display:none;position:fixed;inset:0;z-index:20;place-items:center;padding:18px;background:#1e2c446b;backdrop-filter:blur(5px)} .modal.show{display:grid} .modal-card{width:min(430px,100%);padding:26px;border-radius:27px;background:white;text-align:center;box-shadow:0 22px 65px #18233955} .trophy{font-size:70px} .modal h2{margin:3px 0 6px;font-size:33px} .modal p{font-size:19px;font-weight:850;color:var(--muted)}
@media(max-width:980px){.board{grid-template-columns:1fr 1fr} .right{grid-column:1/-1}} @media(max-width:650px){.app{width:calc(100% - 6px);margin:3px auto;padding:10px;border-radius:21px} .top{align-items:flex-start} .small{display:none} .task{grid-template-columns:auto 1fr} .price{grid-column:1/-1;width:100%;min-width:0;display:flex;justify-content:center;align-items:center;gap:9px} .price small,.price strong{display:inline} .board{grid-template-columns:1fr} .bank{grid-template-columns:repeat(3,1fr)} .actions{grid-template-columns:1fr 1fr} .actions .primary{grid-column:1/-1;grid-row:1}}
</style>
</head>
<body>
<main class="app">
<div class="top"><div class="title"><div class="badge">💶</div><div><h1>Geld-Entdecker</h1><div class="small">ziehen oder antippen</div></div></div><div><button class="round" id="speak" title="Vorlesen">🔊</button> <button class="round" id="newTop" title="Neue Aufgabe">↻</button></div></div>
<section class="task"><div class="product" id="icon">📱</div><div><div class="task-name" id="name">iPad-Zeit</div><div class="task-way" id="prompt">Finde 4 Wege.</div></div><div class="price"><small>Preis</small><strong id="target">2,52 €</strong></div></section>
<div class="progress"><span id="progressText">0 gefunden</span><div class="dots" id="dots"></div></div>
<section class="board">
<section class="card"><div class="head"><h2>Geldkiste</h2><div class="hint">Geld nehmen</div></div><div class="bank" id="bank"></div></section>
<section class="card"><div class="head"><h2>Hier legen</h2><div class="hint">zum Entfernen antippen</div></div><div class="tray" id="tray"></div><div class="sumline"><div class="meter"><i id="fill"></i></div><div class="sum" id="sum"></div></div><div class="actions"><button class="btn orange" id="undo">↶ zurück</button><button class="btn primary" id="check">✓ prüfen</button><button class="btn soft" id="clear">leeren</button></div><div class="feedback" id="feedback" aria-live="polite">Wähle Geld aus.</div></section>
<aside class="right"><section class="card"><div class="head"><h2>Richtig</h2><div class="hint" id="count">0 / 4</div></div><div class="solutions" id="solutions"></div></section><details><summary>⚙️ Lehrkraft</summary><div class="settings"><div class="setting"><label for="level">Geld-Auswahl</label><select id="level"><option value="1">Münzen bis 2 €</option><option value="2">mit Scheinen bis 20 €</option><option value="3">alle Scheine</option></select></div><div class="setting"><label for="ways">Wege</label><select id="ways"><option value="auto">wechselnd</option><option value="1">1 Weg</option><option value="2">2 Wege</option><option value="3">3 Wege</option><option value="4">4 Wege</option></select></div><div class="two"><button class="btn soft" id="newTask">neue Zahl</button><button class="btn soft" id="reset">neu starten</button></div></div></details></aside>
</section></main>
<div class="modal" id="modal"><div class="modal-card"><div class="trophy">🌟</div><h2>Geschafft!</h2><p id="doneText"></p><button class="btn primary" id="next">neue Aufgabe</button></div></div>
<script>
async function loadSprite(){
  const response=await fetch('geld.html?v=20260705',{cache:'no-store'});
  if(!response.ok)throw new Error('Geldbilder konnten nicht geladen werden.');
  const source=await response.text();
  const match=source.match(/background-image:url\("(data:image\/webp;base64,[^"]+)"\)/);
  if(!match)throw new Error('Geldbilder wurden nicht gefunden.');
  document.documentElement.style.setProperty('--money-sprite',`url("${match[1]}")`);
}
const pos={c1:[0,0],c2:[33.333,0],c5:[66.667,0],c10:[100,0],c20:[0,33.333],c50:[33.333,33.333],e1:[66.667,33.333],e2:[100,33.333],e5:[0,66.667],e10:[33.333,66.667],e20:[66.667,66.667],e50:[100,66.667],e100:[0,100],e200:[33.333,100]};
const money=[["c1",1,"1 ct"],["c2",2,"2 ct"],["c5",5,"5 ct"],["c10",10,"10 ct"],["c20",20,"20 ct"],["c50",50,"50 ct"],["e1",100,"1 €"],["e2",200,"2 €"],["e5",500,"5 €"],["e10",1000,"10 €"],["e20",2000,"20 €"],["e50",5000,"50 €"],["e100",10000,"100 €"],["e200",20000,"200 €"]].map(x=>({id:x[0],value:x[1],label:x[2]}));
const tasks=[{l:1,n:"iPad-Zeit",i:"📱",p:252,w:4},{l:1,n:"Sticker",i:"⭐",p:52,w:3},{l:1,n:"Radiergummi",i:"🩵",p:16,w:2},{l:1,n:"Bleistift",i:"✏️",p:27,w:3},{l:1,n:"Eis",i:"🍦",p:120,w:3},{l:1,n:"Springseil",i:"➰",p:350,w:4},{l:1,n:"Ball",i:"⚽",p:420,w:4},{l:1,n:"Kreide",i:"🖍️",p:75,w:2},{l:2,n:"Buch",i:"📘",p:700,w:3},{l:2,n:"Puzzle",i:"🧩",p:1250,w:4},{l:2,n:"Spiel",i:"🎲",p:1820,w:4},{l:2,n:"Ranzen",i:"🎒",p:2350,w:3},{l:3,n:"Fahrrad",i:"🚲",p:5000,w:3},{l:3,n:"Tablet",i:"💻",p:10000,w:4},{l:3,n:"Klassenfahrt",i:"🚌",p:20000,w:4}];
const $=s=>document.querySelector(s),E={icon:$("#icon"),name:$("#name"),prompt:$("#prompt"),target:$("#target"),progressText:$("#progressText"),dots:$("#dots"),tray:$("#tray"),fill:$("#fill"),sum:$("#sum"),feedback:$("#feedback"),bank:$("#bank"),count:$("#count"),solutions:$("#solutions"),level:$("#level"),ways:$("#ways"),modal:$("#modal"),doneText:$("#doneText")};
let task={...tasks[0]},selected=[],found=[],last="";
const fmt=c=>(c/100).toLocaleString("de-DE",{style:"currency",currency:"EUR"}),pic=id=>{const [x,y]=pos[id];return `<span class="money-img" style="--x:${x}%;--y:${y}%"></span>`},total=()=>selected.reduce((s,id)=>s+money.find(m=>m.id===id).value,0),signature=a=>money.map(m=>{const n=a.filter(id=>id===m.id).length;return n?m.id+":"+n:""}).filter(Boolean).join("|");
function message(t,c=""){E.feedback.textContent=t;E.feedback.className=("feedback "+c).trim()}
function visibleMoney(){const max=+E.level.value===1?200:+E.level.value===2?2000:20000;return money.filter(m=>m.value<=max&&m.value<=task.p)}
function renderBank(){E.bank.innerHTML="";visibleMoney().forEach(m=>{const b=document.createElement("button");b.type="button";b.className="money-btn";b.draggable=true;b.innerHTML=pic(m.id)+`<span class="money-label">${m.label}</span>`;b.onclick=()=>add(m.id);b.ondragstart=e=>{b.classList.add("dragging");e.dataTransfer.setData("text/plain",m.id);e.dataTransfer.effectAllowed="copy"};b.ondragend=()=>b.classList.remove("dragging");E.bank.appendChild(b)})}
function add(id){if(found.length>=task.w)return;const m=money.find(x=>x.id===id),n=total()+m.value;if(n>task.p){message("Zu viel.","try");return}selected.push(id);renderTray();message(n===task.p?"Genau! Jetzt prüfen.":"Weiter legen.",n===task.p?"good":"")}
function renderTray(){E.tray.innerHTML="";if(!selected.length)E.tray.innerHTML='<div class="empty">Lege hier Geld ab</div>';selected.forEach((id,i)=>{const b=document.createElement("button");b.type="button";b.className="placed";b.innerHTML=pic(id);b.onclick=()=>{selected.splice(i,1);renderTray();message("Ein Geld weg.")};E.tray.appendChild(b)});const t=total();E.sum.textContent=fmt(t);E.fill.style.width=Math.min(100,t/task.p*100)+"%";$("#undo").disabled=$("#clear").disabled=!selected.length}
function renderProgress(){E.dots.innerHTML="";for(let i=0;i<task.w;i++)E.dots.insertAdjacentHTML("beforeend",`<span class="dot ${i<found.length?"done":""}">${i<found.length?"✓":i+1}</span>`);E.progressText.textContent=`${found.length} gefunden`;E.count.textContent=`${found.length} / ${task.w}`}
function renderSolutions(){E.solutions.innerHTML="";if(!found.length){E.solutions.innerHTML='<div class="solution-empty">Noch leer</div>';return}found.forEach((ids,i)=>E.solutions.insertAdjacentHTML("beforeend",`<div class="solution"><div class="num">${i+1}</div><div class="solution-money">${ids.map(pic).join("")}</div></div>`))}
function check(){if(!selected.length){message("Lege Geld ab.","try");return}if(total()!==task.p){message(total()<task.p?"Es fehlt noch Geld.":"Zu viel.","try");return}const sig=signature(selected);if(found.some(a=>signature(a)===sig)){message("Diesen Weg hast du schon.","same");return}found.push([...selected].sort((a,b)=>money.find(m=>m.id===b).value-money.find(m=>m.id===a).value));selected=[];renderTray();renderProgress();renderSolutions();if(found.length===task.w){message("Super!","good");setTimeout(()=>{E.doneText.textContent=`Du hast ${task.w} Wege gefunden.`;E.modal.classList.add("show")},250)}else message("Richtig! Finde einen anderen Weg.","good")}
function apply(t){task={...t};if(E.ways.value!=="auto")task.w=+E.ways.value;selected=[];found=[];E.icon.textContent=task.i;E.name.textContent=task.n;E.target.textContent=fmt(task.p);E.prompt.textContent=task.w===1?"Finde 1 Weg.":`Finde ${task.w} Wege.`;E.modal.classList.remove("show");renderBank();renderTray();renderProgress();renderSolutions();message("Wähle Geld aus.");last=`${task.l}-${task.n}-${task.p}`}
function nextTask(){let pool=tasks.filter(t=>t.l===+E.level.value);const other=pool.filter(t=>`${t.l}-${t.n}-${t.p}`!==last);if(other.length)pool=other;apply(pool[Math.floor(Math.random()*pool.length)]||tasks[0])}
function speak(){if(!("speechSynthesis"in window))return;const e=Math.floor(task.p/100),c=task.p%100,u=new SpeechSynthesisUtterance(`${task.n} kostet ${e?e+" Euro":""}${e&&c?" und ":""}${c?c+" Cent":""}. ${task.w===1?"Finde einen Weg.":"Finde "+task.w+" Wege."}`);u.lang="de-DE";u.rate=.86;speechSynthesis.cancel();speechSynthesis.speak(u)}
["dragenter","dragover"].forEach(ev=>E.tray.addEventListener(ev,e=>{e.preventDefault();E.tray.classList.add("over")}));["dragleave","drop"].forEach(ev=>E.tray.addEventListener(ev,e=>{e.preventDefault();if(ev==="drop"){const id=e.dataTransfer.getData("text/plain");if(id)add(id)}E.tray.classList.remove("over")}));
$("#check").onclick=check;$("#undo").onclick=()=>{selected.pop();renderTray();message("Ein Geld weg.")};$("#clear").onclick=()=>{selected=[];renderTray();message("Alles weg.")};$("#speak").onclick=speak;$("#newTop").onclick=$("#newTask").onclick=$("#next").onclick=nextTask;$("#reset").onclick=()=>apply(task);E.level.onchange=nextTask;E.ways.onchange=()=>apply(task);loadSprite().then(()=>apply(tasks[0])).catch(error=>{document.querySelector("#feedback").textContent=error.message});
</script>
</body>
</html>
