name: Uhreninsel auf GitHub Pages veröffentlichen

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: GitHub Pages einrichten
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Webseite hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Webseite veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
